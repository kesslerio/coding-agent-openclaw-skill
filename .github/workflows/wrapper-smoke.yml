name: Wrapper Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  wrappers:
    runs-on: ubuntu-latest
    env:
      CODING_AGENT_ALLOW_NONCANONICAL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Python wrapper policy tests
        run: python3 -m unittest tests/python/test_wrapper_policy.py

      - name: Bash syntax check
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            [[ -f "$script" ]] || continue
            if ! head -n 1 "$script" | grep -Eq '^#!/usr/bin/env (bash|sh)$|^#!/bin/(bash|sh)$'; then
              continue
            fi
            bash -n "$script"
          done < <(git ls-files scripts)

      - name: Shellcheck
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            [[ -f "$script" ]] || continue
            if ! head -n 1 "$script" | grep -Eq '^#!/usr/bin/env (bash|sh)$|^#!/bin/(bash|sh)$'; then
              continue
            fi
            shellcheck "$script"
          done < <(git ls-files scripts)

      - name: Codex doc drift checks
        run: ./scripts/doc-drift-check

      - name: Wrapper smoke tests
        run: ./scripts/smoke-wrappers.sh
